# ── Coturn configuration ──────────────────────────────────────────────────────
# Docs: https://github.com/coturn/coturn/wiki/turnserver

# Listening ports
listening-port=3478
tls-listening-port=5349

# Your server's public IP — set via COTURN_EXTERNAL_IP env var or edit here
# external-ip=1.2.3.4

# Relay ports range (keep this range open in your firewall / security group)
min-port=49152
max-port=65535

# Realm — any domain-like string
realm=rtc.local

# Shared secret auth (matches TURN_USERNAME / TURN_CREDENTIAL in docker-compose)
user=rtcuser:changeme

# Logging
log-file=/var/log/coturn/turnserver.log
verbose

# Security
no-multicast-peers
# NOTE: denied-peer-ip rules for RFC1918 ranges are intentionally removed
# to allow testing over VPN (which assigns private IP addresses).
# Re-add these for production if needed:

# Disable plain UDP/TCP if you only want to relay (optional, safer)
# no-udp
# no-tcp